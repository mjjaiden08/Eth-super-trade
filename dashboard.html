<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
  margin: 0;
  background: #0B0B0B;
  color: white;
  font-family: Arial;
}

.header {
  text-align: center;
  padding: 20px;
  color: #D4AF37;
}

.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  padding: 20px;
}

.chart, .signal {
  background: #1A1A1A;
  border-radius: 10px;
  padding: 20px;
}

.buy { color: #00ff99; }
.sell { color: #ff4d4d; }
</style>
</head>

<body>

<div class="header">
  Super Trader Bot - Live Dashboard
</div>

<div class="container">

  <!-- CHART -->
  <div class="chart">
    <div id="tv_chart"></div>
  </div>

  <!-- SIGNAL -->
  <div class="signal">
    <h2 id="type">Loading...</h2>

    <p>Entry: <span id="entry"></span></p>
    <p>SL: <span id="sl"></span></p>
    <p>TP: <span id="tp"></span></p>
    <p>Confidence: <span id="confidence"></span></p>
    <p>Time: <span id="time"></span></p>
  </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "OANDA:ETHUSD",
  "interval": "15",
  "timezone": "Asia/Jakarta",
  "theme": "dark",
  "container_id": "tv_chart"
});
</script>

<script>
async function loadSignal() {
  const res = await fetch("/signal");
  const data = await res.json();

  document.getElementById("type").innerText = data.type;
  document.getElementById("type").className = data.type.toLowerCase();

  document.getElementById("entry").innerText = data.entry;
  document.getElementById("sl").innerText = data.sl;
  document.getElementById("tp").innerText = data.tp;
  document.getElementById("confidence").innerText = data.confidence;
  document.getElementById("time").innerText = data.time;
}

setInterval(loadSignal, 5000);
loadSignal();
</script>

</body>
</html>
